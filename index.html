<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCALE 9-Year NRS MSG Summary Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 2rem;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 0.5rem;
            color: #222;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 2rem;
        }
        .controls {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .control-group {
            flex: 1;
            min-width: 200px;
        }
        .control-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #555;
        }
        select, input {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            color: #333;
            font-family: inherit;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #378ADD;
            box-shadow: 0 0 0 3px rgba(55, 138, 221, 0.1);
        }
        .button-group {
            display: flex;
            gap: 8px;
        }
        button {
            padding: 10px 16px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            color: #333;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        button:hover {
            border-color: #999;
            background: #f9f9f9;
        }
        button.active {
            border-color: #378ADD;
            background: #E6F1FB;
            color: #0C447C;
        }
        .chart-container {
            margin: 2rem 0;
            padding: 1.5rem;
            background: #fafafa;
            border-radius: 8px;
        }
        svg {
            width: 100%;
            height: auto;
            display: block;
        }
        .info-box {
            background: #f0f4f8;
            border-left: 4px solid #378ADD;
            padding: 1rem;
            border-radius: 4px;
            margin-top: 1.5rem;
            font-size: 13px;
            color: #555;
        }
        .info-box strong {
            color: #333;
            display: block;
            margin-bottom: 4px;
        }
        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
            }
            .control-group {
                width: 100%;
            }
            body {
                padding: 1rem;
            }
            .container {
                padding: 1rem;
            }
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SCALE 9-Year NRS MSG Summary</h1>
        <p class="subtitle">Program trends FY 16-17 through FY 24-25</p>
        
        <div class="controls">
            <div class="control-group">
                <label>Select metric:</label>
                <select id="metricSelect">
                    <optgroup label="ESL">
                        <option value="esl_participants">ESL Participants</option>
                        <option value="esl_hours">ESL Hours</option>
                        <option value="esl_gains">ESL # Gains</option>
                        <option value="esl_msg">ESL % MSG</option>
                    </optgroup>
                    <optgroup label="ABE">
                        <option value="abe_participants">ABE Participants</option>
                        <option value="abe_hours">ABE Hours</option>
                        <option value="abe_gains">ABE # Gains</option>
                        <option value="abe_msg">ABE % MSG</option>
                        <option value="abe_diplomas">ABE # Diplomas</option>
                    </optgroup>
                    <optgroup label="Grand Totals">
                        <option value="grand_participants">Grand Participants</option>
                        <option value="grand_hours">Grand Hours</option>
                        <option value="grand_gains">Grand # Gains</option>
                        <option value="grand_msg">Grand % MSG</option>
                    </optgroup>
                </select>
            </div>
            
            <div class="button-group">
                <button id="lineBtn" class="active">Trend line</button>
                <button id="barBtn">Bar chart</button>
            </div>
        </div>
 
        <div class="chart-container">
            <svg id="chart" viewBox="0 0 900 380" style="min-height: 350px;"></svg>
        </div>
 
        <div class="info-box">
            <strong id="metricLabel">ESL Participants</strong>
            <p>9-year trend showing annual progress. ESL data unavailable for FY 21-22. Hover over data points for exact values.</p>
        </div>
    </div>
 
    <script>
        const data = {
            years: ['16-17', '17-18', '18-19', '19-20', '20-21', '21-22', '22-23', '23-24', '24-25'],
            esl_participants: [322, 287, 277, 215, 209, null, 254, 261, 322],
            esl_hours: [27922, 35118, 35544, 27286, 22493, null, 23331, 20628, 32012],
            esl_gains: [159, 153, 49, 58, 58, null, 116, 82, 195],
            esl_msg: [49.38, 53.31, 36.55, 17.69, 27.44, null, 28.23, 45.67, 60.87],
            abe_participants: [94, 91, 148, 136, 128, 88, 178, 249, 237],
            abe_hours: [7114, 9286, 17338, 16054, 12174, 7888, 20435, 17676, 27731],
            abe_gains: [14, 16, 19, 19, 21, 10, 68, 70, 100],
            abe_msg: [17.02, 20.88, 34.65, 16.89, 22.79, 19.32, 28.13, 50.56, 56.96],
            abe_diplomas: [1, 3, 6, 12, 15, 7, 22, 23, 35],
            grand_participants: [416, 378, 425, 351, 337, 88, 432, 510, 559],
            grand_hours: [35036, 44404, 52882, 43340, 34667, 7888, 43766, 38304, 59742],
            grand_gains: [173, 169, 68, 77, 79, 10, 184, 152, 295],
            grand_msg: [42.07, 45.5, 36.06, 17.41, 25.64, 9.28, 28.19, 47.69, 59.21]
        };
 
        const labels = {
            esl_participants: 'ESL Participants',
            esl_hours: 'ESL Hours',
            esl_gains: 'ESL # Gains',
            esl_msg: 'ESL % MSG',
            abe_participants: 'ABE Participants',
            abe_hours: 'ABE Hours',
            abe_gains: 'ABE # Gains',
            abe_msg: 'ABE % MSG',
            abe_diplomas: 'ABE # Diplomas',
            grand_participants: 'Grand Participants',
            grand_hours: 'Grand Hours',
            grand_gains: 'Grand # Gains',
            grand_msg: 'Grand % MSG'
        };
 
        let currentMetric = 'esl_participants';
        let chartType = 'line';
 
        function drawChart() {
            const svg = document.getElementById('chart');
            svg.innerHTML = '';
            
            const values = data[currentMetric].filter(v => v !== null);
            const min = Math.min(...values);
            const max = Math.max(...values);
            const range = max - min || 1;
            
            const width = 900;
            const height = 380;
            const padding = { top: 30, right: 30, bottom: 60, left: 70 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;
            
            const xStep = chartWidth / (data.years.length - 1);
            const yMin = Math.max(0, min - range * 0.1);
            const yMax = max + range * 0.1;
            
            // Grid lines and Y labels
            for (let i = 0; i <= 4; i++) {
                const y = yMin + (yMax - yMin) * (i / 4);
                const py = padding.top + chartHeight - (y - yMin) / (yMax - yMin) * chartHeight;
                
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', padding.left);
                line.setAttribute('y1', py);
                line.setAttribute('x2', width - padding.right);
                line.setAttribute('y2', py);
                line.setAttribute('stroke', '#ddd');
                line.setAttribute('stroke-width', '1');
                svg.appendChild(line);
                
                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('x', padding.left - 10);
                label.setAttribute('y', py + 4);
                label.setAttribute('text-anchor', 'end');
                label.setAttribute('font-size', '12');
                label.setAttribute('fill', '#888');
                label.textContent = Math.round(y).toLocaleString();
                svg.appendChild(label);
            }
            
            // X axis labels
            for (let i = 0; i < data.years.length; i++) {
                const x = padding.left + i * xStep;
                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('x', x);
                label.setAttribute('y', height - 20);
                label.setAttribute('text-anchor', 'middle');
                label.setAttribute('font-size', '12');
                label.setAttribute('fill', '#888');
                label.textContent = 'FY ' + data.years[i];
                svg.appendChild(label);
            }
            
            // Axes
            const xAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            xAxis.setAttribute('x1', padding.left);
            xAxis.setAttribute('y1', padding.top + chartHeight);
            xAxis.setAttribute('x2', width - padding.right);
            xAxis.setAttribute('y2', padding.top + chartHeight);
            xAxis.setAttribute('stroke', '#333');
            xAxis.setAttribute('stroke-width', '1');
            svg.appendChild(xAxis);
            
            const yAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            yAxis.setAttribute('x1', padding.left);
            yAxis.setAttribute('y1', padding.top);
            yAxis.setAttribute('x2', padding.left);
            yAxis.setAttribute('y2', padding.top + chartHeight);
            yAxis.setAttribute('stroke', '#333');
            yAxis.setAttribute('stroke-width', '1');
            svg.appendChild(yAxis);
            
            if (chartType === 'line') {
                let pathData = 'M';
                let first = true;
                for (let i = 0; i < data[currentMetric].length; i++) {
                    const val = data[currentMetric][i];
                    if (val === null) continue;
                    const x = padding.left + i * xStep;
                    const y = padding.top + chartHeight - (val - yMin) / (yMax - yMin) * chartHeight;
                    pathData += (first ? '' : ' L') + ' ' + x + ' ' + y;
                    first = false;
                }
                
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathData);
                path.setAttribute('stroke', '#378ADD');
                path.setAttribute('stroke-width', '3');
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke-linecap', 'round');
                path.setAttribute('stroke-linejoin', 'round');
                svg.appendChild(path);
                
                // Draw points
                for (let i = 0; i < data[currentMetric].length; i++) {
                    const val = data[currentMetric][i];
                    if (val === null) continue;
                    const x = padding.left + i * xStep;
                    const y = padding.top + chartHeight - (val - yMin) / (yMax - yMin) * chartHeight;
                    
                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('cx', x);
                    circle.setAttribute('cy', y);
                    circle.setAttribute('r', '5');
                    circle.setAttribute('fill', '#378ADD');
                    circle.setAttribute('stroke', 'white');
                    circle.setAttribute('stroke-width', '2');
                    svg.appendChild(circle);
                    
                    // Tooltip on hover
                    circle.addEventListener('mouseover', (e) => {
                        circle.setAttribute('r', '7');
                        const tooltip = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        tooltip.setAttribute('x', x);
                        tooltip.setAttribute('y', y - 15);
                        tooltip.setAttribute('text-anchor', 'middle');
                        tooltip.setAttribute('font-size', '12');
                        tooltip.setAttribute('fill', '#333');
                        tooltip.setAttribute('font-weight', 'bold');
                        tooltip.setAttribute('pointer-events', 'none');
                        tooltip.textContent = Math.round(val * 10) / 10;
                        tooltip.id = 'tooltip-' + i;
                        svg.appendChild(tooltip);
                    });
                    
                    circle.addEventListener('mouseout', () => {
                        circle.setAttribute('r', '5');
                        const tooltip = document.getElementById('tooltip-' + i);
                        if (tooltip) tooltip.remove();
                    });
                }
            } else {
                const barWidth = chartWidth / data.years.length * 0.5;
                const spacing = (chartWidth - barWidth * data.years.length) / (data.years.length + 1);
                
                for (let i = 0; i < data[currentMetric].length; i++) {
                    const val = data[currentMetric][i];
                    if (val === null) continue;
                    const x = padding.left + spacing + i * (barWidth + spacing);
                    const barHeight = (val - yMin) / (yMax - yMin) * chartHeight;
                    const y = padding.top + chartHeight - barHeight;
                    
                    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    rect.setAttribute('x', x);
                    rect.setAttribute('y', y);
                    rect.setAttribute('width', barWidth);
                    rect.setAttribute('height', barHeight);
                    rect.setAttribute('fill', '#85B7EB');
                    svg.appendChild(rect);
                    
                    // Tooltip on hover
                    rect.addEventListener('mouseover', (e) => {
                        rect.setAttribute('fill', '#378ADD');
                        const tooltip = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        tooltip.setAttribute('x', x + barWidth / 2);
                        tooltip.setAttribute('y', y - 5);
                        tooltip.setAttribute('text-anchor', 'middle');
                        tooltip.setAttribute('font-size', '12');
                        tooltip.setAttribute('fill', '#333');
                        tooltip.setAttribute('font-weight', 'bold');
                        tooltip.setAttribute('pointer-events', 'none');
                        tooltip.textContent = Math.round(val * 10) / 10;
                        tooltip.id = 'tooltip-' + i;
                        svg.appendChild(tooltip);
                    });
                    
                    rect.addEventListener('mouseout', () => {
                        rect.setAttribute('fill', '#85B7EB');
                        const tooltip = document.getElementById('tooltip-' + i);
                        if (tooltip) tooltip.remove();
                    });
                }
            }
        }
 
        document.getElementById('metricSelect').addEventListener('change', (e) => {
            currentMetric = e.target.value;
            document.getElementById('metricLabel').textContent = labels[currentMetric];
            drawChart();
        });
 
        document.getElementById('lineBtn').addEventListener('click', () => {
            chartType = 'line';
            document.getElementById('lineBtn').classList.add('active');
            document.getElementById('barBtn').classList.remove('active');
            drawChart();
        });
 
        document.getElementById('barBtn').addEventListener('click', () => {
            chartType = 'bar';
            document.getElementById('barBtn').classList.add('active');
            document.getElementById('lineBtn').classList.remove('active');
            drawChart();
        });
 
        drawChart();
    </script>
</body>
</html>
